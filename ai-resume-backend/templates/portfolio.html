<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildCV.ai - Document Management History</title>
    <style>
        :root {
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-400: #94a3b8;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --slate-950: #020617;
            --indigo-500: #6366f1;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(145deg, var(--slate-900), var(--slate-950)); margin: 0; padding: 40px 20px; display: flex; justify-content: center; min-height: 100vh; color: var(--slate-50); box-sizing: border-box; }
        .container { background: rgba(30, 41, 59, 0.3); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); padding: 35px; border-radius: var(--radius-lg); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); width: 100%; max-width: 800px; border: 1px solid rgba(255, 255, 255, 0.05); }
        h2 { font-size: 1.4rem; font-weight: 700; border-bottom: 1px solid var(--slate-800); padding-bottom: 12px; margin-top: 0; margin-bottom: 25px; }
        .back-link { text-decoration: none; color: var(--slate-400); font-weight: 600; font-size: 0.75rem; display: inline-block; margin-bottom: 15px; }
        .back-link:hover { color: var(--indigo-500); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(15, 23, 42, 0.6); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--slate-800); }
        th, td { padding: 14px 18px; text-align: left; font-size: 0.85rem; }
        th { background: var(--slate-800); color: var(--slate-100); font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; }
        tr { border-bottom: 1px solid var(--slate-800); }
        tr:last-child { border-bottom: none; }
        td { color: var(--slate-300); }
        .badge { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; border: 1px solid rgba(99, 102, 241, 0.2); text-transform: capitalize; }
        .loading-row { text-align: center; color: var(--slate-400); }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-link">← BACK TO PORTAL</a>
    <h2>📁 Document Archive History Log</h2>
    
    <table id="portfolioTable">
        <thead>
            <tr>
                <th>Candidate Profile Name</th>
                <th>Contact Email</th>
                <th>Layout Style Choice</th>
                <th>Saved Timestamp Date</th>
            </tr>
        </thead>
        <tbody id="tableBodyContent">
            <tr>
                <td colspan="4" class="loading-row">Loading portfolio tracking rows data...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    async function loadPortfolioLogs() {
        try {
            const response = await fetch('/api/list-cvs');
            const resData = await response.json();
            const tbody = document.getElementById('tableBodyContent');
            tbody.innerHTML = '';
            
            if (response.ok && resData.data.length > 0) {
                resData.data.forEach(item => {
                    const row = document.createElement('tr');
                    const cleanDate = new Date(item.created_at).toLocaleString();
                    const cleanLayout = item.chosen_layout.replace('layout-', '');
                    
                    row.innerHTML = `
                        <td style="font-weight:600; color:var(--slate-100);">${item.candidate_name}</td>
                        <td>${item.email || 'N/A'}</td>
                        <td><span class="badge">${cleanLayout}</span></td>
                        <td style="font-size:0.8rem; color:var(--slate-400);">${cleanDate}</td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--slate-400);">No CV documents archived inside your MySQL tables yet.</td></tr>`;
            }
        } catch (error) {
            document.getElementById('tableBodyContent').innerHTML = `<tr><td colspan="4" style="text-align:center; color:#fda4af;">Failed parsing record logs parameters index.</td></tr>`;
        }
    }
    window.onload = loadPortfolioLogs;
</script>

</body>
</html>
